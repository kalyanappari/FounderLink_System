version: "3.9"

networks:
  founderlink-internal:
  proxy-net:
    external: true

volumes:
  auth-db-data:
  user-db-data:
  startup-db-data:
  investment-db-data:
  team-db-data:
  messaging-db-data:
  notification-db-data:
  payment-db-data:
  wallet-db-data:
  redis-data:
  rabbitmq-data:

services:

  auth-db:
    image: mysql:8.0
    init: true
    container_name: auth-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: auth_service_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/mysql
    networks:
      - founderlink-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  user-db:
