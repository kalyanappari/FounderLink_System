   # ================= CORE INFRA ================= #

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis-data:/data
    networks:
      - founderlink-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - founderlink-internal
    restart: unless-stopped

  # ================= OBSERVABILITY ================= #

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    networks:
      - founderlink-internal
      - proxy-net
    expose:
      - "9411"
    restart: unless-stopped

  # ================= DISCOVERY ================= #

  eureka-server:
    image: kalyan3003/eureka-server:${TAG}
    container_name: eureka-server
    networks:
      - founderlink-internal
      - proxy-net
    expose:
      - "8761"
    depends_on:
      - redis
    restart: unless-stopped

  config-server:
    image: kalyan3003/config-server:${TAG}
    container_name: config-server
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka
    networks:
      - founderlink-internal
    expose:
      - "8888"
    depends_on:
      - eureka-server
    restart: unless-stoppedazureuser@founderlink-vm:~/FounderLink_System$ cat docker-compose.monitoring.yml
version: "3.9"

networks:
  founderlink-internal:
  proxy-net:
    external: true

volumes:
  grafana-data:
  loki-data:
  prometheus-data:
  service-logs:

services:

  # ================= LOGGING ================= #

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - founderlink-internal
    expose:
      - "3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - service-logs:/var/log/founderlink:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - founderlink-internal
    depends_on:
      - loki
    restart: unless-stopped

  # ================= METRICS ================= #

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - founderlink-internal
      - proxy-net
    expose:
      - "9090"
    restart: unless-stopped

  # ================= DASHBOARD ================= #

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - founderlink-internal
      - proxy-net
    expose:
      - "3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped