  messaging-db:
    image: mysql:8.0
    init: true
    container_name: messaging-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: messaging_db
      MYSQL_USER: ${DB_USERNAME}
