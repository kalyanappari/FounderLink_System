resilience4j:
  retry:
    instances:
      userServiceSync:
        max-attempts: 3
        wait-duration: 1ms
        enable-exponential-backoff: false
  circuitbreaker:
    instances:
      userServiceSync:
        sliding-window-size: 10
        minimum-number-of-calls: 10

