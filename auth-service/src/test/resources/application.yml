spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  config:
    import: "" # Disable config server import for tests
  datasource:
    url: jdbc:h2:mem:authdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cache:
    type: simple

