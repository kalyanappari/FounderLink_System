
# ==========================================
# APPLICATION
# ==========================================
server.port=8083
spring.application.name=startup-service

# ==========================================
# MYSQL DATABASE
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/startup_db
spring.datasource.username=root
spring.datasource.password=parth123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# EUREKA CLIENT
# ==========================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ==========================================
# RABBITMQ
# ==========================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ==========================================
# ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


logging.level.root=INFO
logging.level.com.founderlink.startup=DEBUG
logging.file.name=logs/startup-service.log