server.port=8086

spring.application.name=messaging-service

# Eureka Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# DB config
spring.datasource.url=jdbc:mysql://localhost:3306/messaging_db
spring.datasource.username=root
spring.datasource.password=parth123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Logging Configuration for debugging inter-service calls
logging.level.com.founderlink.messaging=DEBUG
logging.level.com.founderlink.messaging.client=DEBUG
logging.level.com.founderlink.messaging.service=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.org.springframework.web.client=DEBUG

# Feign & Eureka logging
logging.level.com.netflix.discovery=INFO
logging.level.com.netflix.eureka=INFO