spring:
  application:
    name: messaging-service

  datasource:
    url: jdbc:h2:mem:messagingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

rabbitmq:
  exchange: founderlink.exchange
  routing-key: messaging.routing.key

resilience4j:
  circuitbreaker:
    instances:
      messagingService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  retry:
    instances:
      messagingService:
        maxAttempts: 3
        waitDuration: 2s
