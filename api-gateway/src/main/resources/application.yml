server:
  port: 8090

spring:
  application:
    name: api-gateway
  config:
    import: configserver:http://config-server:8888

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true
