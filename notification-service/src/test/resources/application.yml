spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:h2:mem:notificationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

rabbitmq:
  queue:
    user:
      registered: founderlink.user.registered
    team:
      accepted: founderlink.team.accepted
      rejected: founderlink.team.rejected
    investment:
      approved: founderlink.investment.approved
      rejected: founderlink.investment.rejected
    payment:
      completed: founderlink.payment.completed
      failed: founderlink.payment.failed
    startup:
      deleted: founderlink.startup.deleted
  exchange: founderlink.exchange

resilience4j:
  circuitbreaker:
    instances:
      userService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
      startupService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  retry:
    instances:
      userService:
        maxAttempts: 3
        waitDuration: 2s
      startupService:
        maxAttempts: 3
        waitDuration: 2s
