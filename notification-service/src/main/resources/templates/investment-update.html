<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base-layout :: layout('Financial Transaction', 'Investment Update', ~{::email_content})}">
<body>
    <div th:fragment="email_content">
        <p>A new status update has been recorded for your investment transaction. Detailed metrics are provided in the summary below.</p>

        <table class="form-table">
            <tr class="form-row">
                <td class="label">Reference ID</td>
                <td class="value" th:text="${'#INV-' + investmentId}">#INV-0000</td>
            </tr>
            <tr class="form-row">
                <td class="label">Legal Entity</td>
                <td class="value" th:text="${userName}">User Name</td>
            </tr>
            <tr class="form-row">
                <td class="label">Update Status</td>
                <td class="value">
                    <span class="badge" th:text="${message}">Update Message</span>
                </td>
            </tr>
            <tr class="form-row">
                <td class="label">Verified Amount</td>
                <td class="value" style="font-weight: 700; color: #6366f1;" th:text="${amount}">$0.00</td>
            </tr>
            <tr class="form-row" th:if="${reason}">
                <td class="label">Strategic Note</td>
                <td class="value" style="font-style: italic; color: #64748b;" th:text="${reason}">Reason</td>
            </tr>
        </table>

        <div style="text-align: center; margin-top: 35px;">
            <a th:href="@{https://founderlink.tech/dashboard/portfolio(id=${investmentId})}" class="button">Audit Transaction</a>
        </div>
    </div>
</body>
</html>
