<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #f8fafc; color: #1e293b; }
        .wrapper { width: 100%; table-layout: fixed; background-color: #f8fafc; padding-bottom: 40px; }
        .main { background-color: #ffffff; margin: 0 auto; width: 100%; max-width: 600px; border-spacing: 0; color: #1e293b; border-radius: 12px; overflow: hidden; margin-top: 40px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .header { background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%); padding: 40px 20px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.025em; }
        .content { padding: 40px 30px; line-height: 1.6; font-size: 16px; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #64748b; }
        .button { display: inline-block; padding: 14px 32px; background-color: #8b5cf6; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 600; margin-top: 20px; transition: background-color 0.2s; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .badge-success { background-color: #dcfce7; color: #166534; }
        .badge-primary { background-color: #ede9fe; color: #5b21b6; }
        .divider { border-top: 1px solid #e2e8f0; margin: 30px 0; }
        @media screen and (max-width: 600px) { .main { border-radius: 0; margin-top: 0; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <table class="main" th:fragment="layout (title, content)">
            <tr>
                <td class="header">
                    <h1>FounderLink</h1>
                </td>
            </tr>
            <tr>
                <td class="content">
                    <h2 style="margin-top: 0; color: #0f172a; font-size: 22px; font-weight: 700;" th:text="${title}">Title Placeholder</h2>
                    <div th:replace="${content}">
                        Content Placeholder
                    </div>
                </td>
            </tr>
            <tr>
                <td class="footer">
                    <p>&copy; 2026 FounderLink Ecosystem. All rights reserved.</p>
                    <p>Building the future of startup collaboration.</p>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
