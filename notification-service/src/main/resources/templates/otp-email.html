<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base-layout :: layout('Security Verification', ~{::email_content})}">
<body>
    <div th:fragment="email_content">
        <p>Hello <strong th:text="${userName}">User</strong>,</p>
        <p>A password reset was requested for your FounderLink account. Please use the following 6-digit PIN to authorize this change:</p>
        
        <div style="background-color: #f1f5f9; border-radius: 12px; padding: 30px; text-align: center; margin: 30px 0;">
            <span style="font-size: 36px; font-weight: 800; letter-spacing: 0.2em; color: #8b5cf6;" th:text="${pin}">000000</span>
        </div>

        <p style="color: #ef4444; font-size: 14px; font-weight: 600;">This PIN will expire in 5 minutes.</p>
        
        <p style="margin-top: 30px; font-size: 14px; color: #64748b;">If you did not request this reset, you can safely ignore this email. Your account remains secure.</p>
    </div>
</body>
</html>
