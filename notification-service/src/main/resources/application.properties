# Server
server.port=8087

# App
spring.application.name=notification-service
spring.config.import=optional:configserver:http://localhost:8888

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# RabbitMQ Connection
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# RabbitMQ Custom Properties
rabbitmq.exchange=founderlink.exchange
rabbitmq.queue.startup=startup.queue
rabbitmq.queue.investment=investment.queue
rabbitmq.queue.team=team.queue
rabbitmq.queue.messaging=messaging.queue

