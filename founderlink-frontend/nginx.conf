server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support Angular SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Production API Proxy
    location /api/ {
        # The trailing slash in proxy_pass is CRITICAL.
        # It tells Nginx to strip the "/api/" prefix before forwarding to the gateway.
        proxy_pass http://api-gateway:8090/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie Path Translation
        # If the gateway sends a cookie for path "/auth", we map it to "/api/auth"
        # so the browser correctly stores it for our proxy-based domain.
        proxy_cookie_path /auth /api/auth;
        
        # Increased timeouts for long-running startup simulations
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";
}
