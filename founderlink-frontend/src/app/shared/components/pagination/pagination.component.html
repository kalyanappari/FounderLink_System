<div class="pagination-container">
  <div class="pagination-info">
    Showing <span class="highlight">{{ startItem }}</span> to <span class="highlight">{{ endItem }}</span> of <span class="highlight">{{ totalItems }}</span> items
  </div>

  <div class="pagination-controls" *ngIf="totalPages() > 1">
    <button class="page-btn nav-btn" [disabled]="currentPage === 1" (click)="prevPage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>

    @for (p of pages(); track p) {
      <button 
        class="page-btn" 
        [class.active]="currentPage === p" 
        (click)="goToPage(p)">
        {{ p }}
      </button>
    }

    <button class="page-btn nav-btn" [disabled]="currentPage === totalPages()" (click)="nextPage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>
</div>
