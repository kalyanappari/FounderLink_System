version: "3.9"

networks:
  founderlink-internal:
  proxy-net:
    external: true

volumes:
  service-logs:

services:

  auth-service:
    image: ${ACR_LOGIN_SERVER}/auth-service:${TAG}
    container_name: auth-service
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/auth-service.log
    volumes:
      - service-logs:/var/log/founderlink
    networks: [founderlink-internal]
    expose:
      - "8080"
    restart: unless-stopped

  user-service:
    image: ${ACR_LOGIN_SERVER}/user-service:${TAG}
    container_name: user-service
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/user-service.log
    volumes:
      - service-logs:/var/log/founderlink
    networks: [founderlink-internal]
    expose:
      - "8081"
    restart: unless-stopped

  startup-service:
    image: ${ACR_LOGIN_SERVER}/startup-service:${TAG}
    container_name: startup-service
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/startup-service.log
    volumes:
      - service-logs:/var/log/founderlink
    networks: [founderlink-internal]
    expose:
      - "8082"
    restart: unless-stopped

  investment-service:
    image: ${ACR_LOGIN_SERVER}/investment-service:${TAG}
    container_name: investment-service
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/investment-service.log
    volumes:
      - service-logs:/var/log/founderlink
    networks: [founderlink-internal]
    expose:
      - "8083"
    restart: unless-stopped

  team-service:
    image: ${ACR_LOGIN_SERVER}/team-service:${TAG}
    container_name: team-service
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/team-service.log
    volumes:
      - service-logs:/var/log/founderlink
    networks: [founderlink-internal]
    expose:
      - "8084"
    restart: unless-stopped

  messaging-service:
    image: ${ACR_LOGIN_SERVER}/messaging-service:${TAG}
    container_name: messaging-service
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/messaging-service.log
    volumes:
      - service-logs:/var/log/founderlink
    networks: [founderlink-internal]
    expose:
      - "8085"
    restart: unless-stopped

  notification-service:
    image: ${ACR_LOGIN_SERVER}/notification-service:${TAG}
    container_name: notification-service
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/notification-service.log
    volumes:
      - service-logs:/var/log/founderlink
    networks: [founderlink-internal]
    expose:
      - "8086"
    restart: unless-stopped

  payment-service:
    image: ${ACR_LOGIN_SERVER}/payment-service:${TAG}
    container_name: payment-service
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/payment-service.log
    volumes:
      - service-logs:/var/log/founderlink
    networks: [founderlink-internal]
    expose:
      - "8087"
    restart: unless-stopped

  wallet-service:
    image: ${ACR_LOGIN_SERVER}/wallet-service:${TAG}
    container_name: wallet-service
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/wallet-service.log
    volumes:
      - service-logs:/var/log/founderlink
    networks: [founderlink-internal]
    expose:
      - "8088"
    restart: unless-stopped

  founderlink-frontend:
    image: ${ACR_LOGIN_SERVER}/founderlink-frontend:${TAG}
    container_name: founderlink-frontend
    networks:
      - proxy-net
    expose:
      - "80"
    restart: unless-stopped

  api-gateway:
    image: ${ACR_LOGIN_SERVER}/api-gateway:${TAG}
    container_name: api-gateway
    env_file: [.env]
    environment:
      LOGGING_FILE_NAME: /var/log/founderlink/api-gateway.log
    volumes:
      - service-logs:/var/log/founderlink
    networks:
      - founderlink-internal
      - proxy-net
    expose:
      - "8090"
    restart: unless-stopped